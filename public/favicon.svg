<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Tło z zaokrąglonymi rogami -->
  <rect width="64" height="64" rx="14" fill="#0d0d22"/>

  <!-- Szubienica -->
  <!-- Podstawa -->
  <line x1="8" y1="58" x2="30" y2="58" stroke="#7c4f2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Słup pionowy -->
  <line x1="16" y1="58" x2="16" y2="10" stroke="#7c4f2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Belka pozioma -->
  <line x1="16" y1="10" x2="42" y2="10" stroke="#7c4f2a" stroke-width="4" stroke-linecap="round"/>
  <!-- Zastrzał -->
  <line x1="16" y1="22" x2="28" y2="10" stroke="#7c4f2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Lina -->
  <line x1="42" y1="10" x2="42" y2="20" stroke="#a08060" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Głowa -->
  <circle cx="42" cy="30" r="10" fill="none" stroke="#4A90D9" stroke-width="3"/>

  <!-- Oczy -->
  <circle cx="38.5" cy="28" r="1.8" fill="#4A90D9"/>
  <circle cx="45.5" cy="28" r="1.8" fill="#4A90D9"/>

  <!-- Uśmiech -->
  <path d="M 38 33 Q 42 37.5 46 33" stroke="#4A90D9" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Tułów -->
  <line x1="42" y1="40" x2="42" y2="52" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <!-- Ręce -->
  <line x1="42" y1="44" x2="35" y2="50" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="44" x2="49" y2="50" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
</svg>
